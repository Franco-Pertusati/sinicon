@if (openShift() != null) {
  <div class="bg-dark rounded-2xl shadow p-1">
    <div class="mb-2">
      <div class="flex gap-4">
        <div class="grow">
          <span class="ml-2">Nombre</span>
        </div>
        <div class="w-24 flex gap-1 items-center">
          <i class="material-symbols-rounded">person</i>
          <span>Mozo</span>
        </div>
        <div class="w-6 flex items-center justify-center">
          <i class="material-symbols-rounded">table_restaurant</i>
        </div>
        <div class="w-11 flex items-center justify-center">
          <i class="material-symbols-rounded">nest_clock_farsight_analog</i>
        </div>
      </div>
    </div>
    <div class="flex flex-col mb-4">
      @for (wine of wines; track $index) {
        <div 
          class="flex gap-4 cursor-pointer"
          (contextmenu)="onWineContextMenu($event, wine)"
        >
          <div class="grow">
            <span class="ml-2">{{ getWineName(wine.wineId) }}</span>
          </div>
          <div class="w-24">
            <span>
              {{ wine.waiter }}
            </span>
          </div>
          <div class="w-6">
            <span>
              {{ wine.table }}
            </span>
          </div>
          <div class="w-11 flex justify-center">
            <span>
              {{ wine.createdAt | date: "HH:mm" }}
            </span>
          </div>
        </div>
      }
    </div>
    <div class="ml-auto w-fit">
      <prt-button
        label="Añadir Registro"
        icon="add"
        (btnClick)="openFormDialog()"
      />
    </div>
  </div>

  @if (contextMenu().visible) {
    <div
      class="fixed z-50"
      [style.left.px]="contextMenu().x"
      [style.top.px]="contextMenu().y"
    >
      <div class="flex flex-col gap-1 p-1 bg-dark rounded-2xl shadow">
        <prt-button label="Repetir Registro" variant="ghost" icon="refresh" (btnClick)="onRecordRepeat()" />
      </div>
    </div>
  }
} @else {
  <app-no-shift />
}
